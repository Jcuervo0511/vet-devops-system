name: CI/CD Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Coverage gate (>= 85%)
        run: |
          node -e "
          const fs=require('fs');
          const p='./coverage/coverage-summary.json';
          const c=JSON.parse(fs.readFileSync(p,'utf8')).total.lines.pct;
          console.log('Lines coverage:', c);
          if (c < 85) { console.error('Coverage gate failed: ' + c + ' < 85'); process.exit(1); }
          "

      - name: Build
        run: npm run build

      - name: Deploy to Render (production)
        if: github.event_name == 'push'
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_PROD"
        env:
          RENDER_DEPLOY_HOOK_PROD: ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}